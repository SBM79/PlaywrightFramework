
name: Playwright Tests

on:

  workflow_dispatch:

  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-22.04

    steps:


      # STEP 1 — Checkout repository

      - name: Checkout code
        uses: actions/checkout@v4


      # STEP 2 — Set up JDK 17 with Maven cache

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'


      # STEP 3 — Compile production + test sources

      - name: Maven compile
        run: mvn compile test-compile -B -q


      # STEP 4 — Install Playwright browsers (Chromium + Firefox)

      - name: Install Playwright browsers
        run: |
          mvn exec:java -e \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps chromium firefox"

      # STEP 5 — Create output directories
      - name: Create output directories
        run: mkdir -p screenshots traces test-output

      # STEP 6 — Run TestNG tests via Maven Surefire

      - name: Run Playwright tests
        run: mvn test -B
        continue-on-error: true

      # STEP 7 — Upload TestNG HTML report as a downloadable artifact
      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestNG-HTML-Report
          path: test-output/
          retention-days: 30

      # STEP 8 — Upload failure screenshots

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Failure-Screenshots
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore


      # STEP 9 — Upload Playwright traces

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Playwright-Traces
          path: traces/
          retention-days: 30
          if-no-files-found: ignore
