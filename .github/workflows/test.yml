# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  .github/workflows/test.yml                                                ║
# ║  SauceDemo Playwright Java Automation Framework — GitHub Actions CI         ║
# ║                                                                             ║
# ║  Placement : .github/workflows/test.yml  (GitHub auto-detects this path)    ║
# ║  Triggers  : push to main  |  pull request to main                         ║
# ║  Runner    : ubuntu-latest (GitHub-hosted)                                  ║
# ║  Runtime   : ~4–6 minutes (browser download + test execution)               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Playwright Tests

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:

      # ────────────────────────────────────────────────────────────────────────
      # STEP 1 — Checkout repository
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────────────
      # STEP 2 — Set up JDK 17 with Maven cache
      #   setup-java@v4 caches ~/.m2/repository automatically when
      #   cache: 'maven' is set — no separate Cache step needed.
      # ────────────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # ────────────────────────────────────────────────────────────────────────
      # STEP 3 — Compile production + test sources
      # ────────────────────────────────────────────────────────────────────────
      - name: Maven compile
        run: mvn compile test-compile -B -q

      # ────────────────────────────────────────────────────────────────────────
      # STEP 4 — Install Playwright browsers (Chromium + Firefox)
      #   --with-deps installs OS-level libraries (libgbm, libasound, etc.)
      #   required by headless Chromium and Firefox on Ubuntu.
      # ────────────────────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: |
          mvn exec:java -e \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps chromium firefox"

      # ────────────────────────────────────────────────────────────────────────
      # STEP 5 — Create output directories
      # ────────────────────────────────────────────────────────────────────────
      - name: Create output directories
        run: mkdir -p screenshots traces test-output

      # ────────────────────────────────────────────────────────────────────────
      # STEP 6 — Run TestNG tests via Maven Surefire
      #   continue-on-error: true ensures Steps 7–10 always execute
      #   (publish results + upload artifacts) even when tests fail.
      # ────────────────────────────────────────────────────────────────────────
      - name: Run Playwright tests
        run: mvn test -B
        continue-on-error: true

      # ────────────────────────────────────────────────────────────────────────
      # STEP 7 — Publish test results to the GitHub Actions "Summary" tab
      #   Parses Surefire XML reports and renders pass/fail counts + details
      #   directly in the workflow run summary and as PR check annotations.
      # ────────────────────────────────────────────────────────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TestNG Results
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

      # ────────────────────────────────────────────────────────────────────────
      # STEP 8 — Upload TestNG HTML report as a downloadable artifact
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestNG-HTML-Report
          path: test-output/
          retention-days: 30

      # ────────────────────────────────────────────────────────────────────────
      # STEP 9 — Upload failure screenshots
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Failure-Screenshots
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore

      # ────────────────────────────────────────────────────────────────────────
      # STEP 10 — Upload Playwright traces
      #   Download the .zip and open at https://trace.playwright.dev
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Playwright-Traces
          path: traces/
          retention-days: 30
          if-no-files-found: ignore
